services:
 
  # ── Web Service — FastAPI ─────────────────────────────────────────
  - type: web
    name: santiago-weather-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: HF_REPO_ID
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: DB_PATH
        value: /tmp/santiago_weather.db
      - key: MODEL_CACHE_DIR
        value: /tmp/model_cache
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /health
 